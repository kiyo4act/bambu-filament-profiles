name: Watch upstreams

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: Vendor key
        required: true
        default: tinmorry

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Check upstream status
        env:
          VENDOR: ${{ github.event.inputs.vendor }}
        run: |
          npm run vendor:status -- --vendor "${VENDOR}"
