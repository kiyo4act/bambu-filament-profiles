name: Candidate release

on:
  push:
    branches:
      - agent/update/**
      - agent/ingest/**
      - candidate/**
  workflow_dispatch:
    inputs:
      vendor:
        description: Vendor key
        required: true
        default: tinmorry

permissions:
  contents: write

concurrency:
  group: candidate-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build:bbsflmt
      - run: npm run verify
      - name: Create candidate prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VENDOR: ${{ github.event.inputs.vendor || 'tinmorry' }}
        run: |
          STAMP="$(TZ=Asia/Tokyo date +'%Y%m%d-%H%M')"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAG="candidate-${STAMP}-${SHORT_SHA}"
          git tag "${TAG}"
          git push origin "${TAG}"
          gh release create "${TAG}" \
            dist/all-bbsflmt.zip \
            dist/all-json.zip \
            dist/all-user-base.zip \
            dist/manifest.json \
            --title "Candidate ${STAMP} ${SHORT_SHA}" \
            --notes-file dist/release-notes.md \
            --prerelease
