name: Validate and release

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run build:bbsflmt
      - run: npm run verify
      - uses: actions/upload-artifact@v4
        with:
          name: bambu-filament-profiles-dist
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:bbsflmt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/all-bbsflmt.zip \
            dist/all-json.zip \
            dist/manifest.json \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/release-notes.md

  stable-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check profile changes
        id: changes
        shell: bash
        run: |
          CHANGED="$(git diff --name-only "${{ github.event.before }}" HEAD || true)"
          if echo "${CHANGED}" | grep -E '^vendors/.*/profiles/' >/dev/null && find vendors -path '*/profiles/*.json' -type f | grep -q .; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.release == 'true'
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: steps.changes.outputs.release == 'true'
      - run: npm run build:bbsflmt
        if: steps.changes.outputs.release == 'true'
      - name: Create stable release
        if: steps.changes.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          STAMP="$(TZ=Asia/Tokyo date +'%Y%m%d-%H%M')"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAG="v${STAMP}-${SHORT_SHA}"
          git tag "${TAG}"
          git push origin "${TAG}"
          gh release create "${TAG}" \
            dist/all-bbsflmt.zip \
            dist/all-json.zip \
            dist/manifest.json \
            --title "Release ${STAMP} ${SHORT_SHA}" \
            --notes-file dist/release-notes.md
